calculate:
  name: Calculate
  description: >-
    Recompute the targeted zone(s): apply the daily net-ET0 depletion (once per
    calendar day) and update the irrigation duration.
  target:
    entity:
      integration: easy_irrigation
      domain: sensor

set_bucket:
  name: Set bucket
  description: Set the soil-moisture bucket (mm) for the targeted zone(s).
  target:
    entity:
      integration: easy_irrigation
      domain: sensor
  fields:
    value:
      name: Value
      description: New bucket value in millimetres.
      required: true
      example: 0
      selector:
        number:
          min: -100
          max: 100
          step: 0.01
          unit_of_measurement: mm

reset_bucket:
  name: Reset bucket
  description: Reset the bucket to 0 mm for the targeted zone(s).
  target:
    entity:
      integration: easy_irrigation
      domain: sensor

register_irrigation:
  name: Register irrigation
  description: >-
    Record that the targeted zone(s) were just watered: refill the bucket and
    stamp today's date. The schedule controller uses the latest such date for
    the global minimum interval between runs.
  target:
    entity:
      integration: easy_irrigation
      domain: sensor
  fields:
    amount_mm:
      name: Amount (mm)
      description: >-
        Water applied, in mm. If omitted, the bucket is reset to 0 (deficit
        fully replenished).
      required: false
      example: 8
      selector:
        number:
          min: 0
          max: 200
          step: 0.1
          unit_of_measurement: mm
