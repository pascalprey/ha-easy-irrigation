calculate:
  name: Calculate
  description: >-
    Recompute the targeted zone(s): apply today's net-ET0 depletion (refreshed to
    the latest value on each call, never double-counted) and update the irrigation
    duration.
  target:
    entity:
      integration: easy_irrigation
      domain: sensor

set_bucket:
  name: Set bucket
  description: Set the soil-moisture bucket (mm) for the targeted zone(s).
  target:
    entity:
      integration: easy_irrigation
      domain: sensor
  fields:
    value:
      name: Value
      description: New bucket value in millimetres.
      required: true
      example: 0
      selector:
        number:
          min: -100
          max: 100
          step: 0.01
          unit_of_measurement: mm

reset_bucket:
  name: Reset bucket
  description: Reset the bucket to 0 mm for the targeted zone(s).
  target:
    entity:
      integration: easy_irrigation
      domain: sensor

register_irrigation:
  name: Register irrigation
  description: >-
    Record that the targeted zone(s) were just watered: refill the bucket and
    stamp today's date. The schedule controller uses the latest such date for
    the global minimum interval between runs.
  target:
    entity:
      integration: easy_irrigation
      domain: sensor
  fields:
    amount_mm:
      name: Amount (mm)
      description: >-
        Water applied, in mm. If omitted, the bucket is reset to 0 (deficit
        fully replenished).
      required: false
      example: 8
      selector:
        number:
          min: 0
          max: 200
          step: 0.1
          unit_of_measurement: mm

run_schedule:
  name: Run schedule
  description: >-
    Immediately run the schedule controller's current plan (manual / test):
    opens each due zone's valve, phases in sequence and zones within a phase in
    parallel. Target a controller entity (e.g. its total-runtime sensor).
  target:
    entity:
      integration: easy_irrigation
      domain: sensor
  fields:
    ignore_skip:
      name: Ignore rain skip
      description: Run even if the rain-forecast skip is currently active.
      default: true
      selector:
        boolean:
    test_seconds:
      name: Test duration (s)
      description: >-
        If set, run each due zone for this many seconds instead of its computed
        duration and do not register the watering - a short hardware /
        orchestration test that leaves the buckets untouched.
      required: false
      example: 5
      selector:
        number:
          min: 1
          max: 3600
          step: 1
          unit_of_measurement: s
